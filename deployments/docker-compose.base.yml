version: '3.8'

services:
    app:
        image: ${ECR_REGISTRY_URL}/${APP_NAME}:${IMAGE_TAG:-latest}
        container_name: ${APP_NAME:-fastapi-app}
        restart: unless-stopped
        env_file:
            - .env
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        networks:
            - app_network
        depends_on:
            db:
                condition: service_healthy
    
    nginx:
        image: nginx:1.25-alpine
        container_name: ${APP_NAME:-fastapi}-nginx
        restart: unless-stopped
        depends_on:
            app:
                condition: service_healthy
        networks:
            - app_network
    db:
        image: postgres:15-alpine
        container_name: ${APP_NAME:-fastapi}-db
        restart: unless-stopped
        env_file:
            - .env
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
            interval: 1m30s
            timeout: 30s
            retries: 5
            start_period: 30s
        networks:
            - app_network
        shm_size: 256mb

networks:
    app_network:
        driver: bridge
volumes:
    postgres_data:
        driver: local