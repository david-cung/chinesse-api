version: '3.8'

services:
  app:
    environment:
      - ENV=production
      - LOG_LEVEL=warning
    restart: always
    # Resource limits to prevent one container from crashing the server
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      # Map logs to host so you can check them without entering container
      - ./logs:/code/logs:rw

  nginx:
    volumes:
      # Map the Nginx config file from your project root
      # NOTE: The path ../nginx refers to the folder at project root
      - ../nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./logs/nginx:/var/log/nginx:rw
    ports:
      # Only Nginx exposes ports to the outside world
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    restart: always

  db:
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Map backups folder for easier access
      - ./backups:/backups:rw
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c work_mem=4MB
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    restart: always
