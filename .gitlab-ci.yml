stages:
  - build
  - deploy

variables:
  # Tag ảnh bằng mã commit ngắn (ví dụ: a1b2c3d) để dễ quản lý version
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  # Đường dẫn đầy đủ tới ảnh trên ECR
  DOCKER_IMAGE: $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG
  DOCKER_IMAGE_LATEST: $ECR_REGISTRY/$APP_NAME:latest

# --- STAGE 1: BUILD & PUSH (Đóng gói và đẩy lên AWS) ---
build_push:
  stage: build
  image: docker:20.10.16
  services:
    - docker:20.10.16-dind
  before_script:
    - apk add --no-cache aws-cli
    # Đăng nhập vào ECR
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    # Build ảnh với tag là commit hash
    - docker build -t $DOCKER_IMAGE .
    # Gán thêm tag 'latest' để dễ dùng
    - docker tag $DOCKER_IMAGE $DOCKER_IMAGE_LATEST
    
    # Đẩy cả 2 tag lên ECR
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main

# --- STAGE 2: DEPLOY (SSH vào server và chạy) ---
deploy_prod:
  stage: deploy
  image: alpine:latest
  before_script:
    # Cài đặt công cụ SSH client
    - apk add --no-cache openssh-client
    
    # Thiết lập SSH Key từ biến môi trường
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    
    # Tạo thư mục config SSH và tắt check host key
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo -e "Host *\n\tStrictHostKeyChecking no\n\n" > ~/.ssh/config
  script:
    # 1. Copy file docker-compose từ GitLab lên Server
    # Lưu ý: Chúng ta copy vào thư mục /home/ubuntu/app/deployments mà bạn đã tạo
    - scp -r deployments/docker-compose.base.yml deployments/docker-compose.prod.yml ubuntu@$EC2_IP:/home/ubuntu/app/deployments/
    
    # 2. SSH vào server và thực hiện lệnh deploy
    - ssh ubuntu@$EC2_IP "
        cd /home/ubuntu/app/deployments &&
        
        # Tạo file .env mới từ biến PROD_ENV_FILE trên GitLab
        echo '$PROD_ENV_FILE' > .env &&
        
        # Đăng nhập ECR trên server (Sử dụng quyền IAM Role của EC2)
        aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY &&
        
        # Xuất biến môi trường cần thiết cho lệnh docker-compose
        export ECR_REGISTRY_URL=$ECR_REGISTRY &&
        export APP_NAME=$APP_NAME &&
        export IMAGE_TAG=$IMAGE_TAG &&
        
        # Pull ảnh mới nhất về (dùng đúng tag của commit này)
        docker compose -f docker-compose.base.yml -f docker-compose.prod.yml pull &&
        
        # Khởi động lại service (Up -d sẽ tự recreate container nếu có ảnh mới)
        docker compose -f docker-compose.base.yml -f docker-compose.prod.yml up -d
      "
  only:
    - main
