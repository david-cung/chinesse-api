# Simple test to verify instance runners work

stages:
- test

test-instance-runner:
  stage: test
  image: alpine:latest
  tags:
  - saas-linux-small-amd64
  script:
  - echo "========================================="
  - echo "Testing Instance Runner"
  - echo "========================================="
  - echo "Runner name: $CI_RUNNER_DESCRIPTION"
  - echo "Runner ID: $CI_RUNNER_ID"
  - echo "Runner tags: $CI_RUNNER_TAGS"
  - echo "GitLab CI: $CI"
  - echo "Pipeline ID: $CI_PIPELINE_ID"
  - echo "Job ID: $CI_JOB_ID"
  - echo "========================================="
  - echo "✅ Instance runner is working!"
  - echo "========================================="
  only:
  - main
